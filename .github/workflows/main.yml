name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and sync
        run: |
          npm install
          npx cap add ios
          npx cap sync ios

      - name: Build unsigned app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Find and package IPA
        run: |
          cd ios/App
          APP_PATH=$(find build/App.xcarchive -name "*.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r ../Tacenda.ipa Payload
          echo "IPA created successfully"
          ls -la ../Tacenda.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tacenda-IPA
          path: ios/App/Tacenda.ipa
          retention-days: 90
