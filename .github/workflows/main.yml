name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and sync
        run: |
          npm install
          npm install @capacitor/keyboard
          npx cap add ios
          npx cap sync ios

      - name: Configure iOS project language
        run: |
          cd ios/App
          # 设置 Info.plist 语言为中文
          /usr/libexec/PlistBuddy -c "Add :CFBundleDevelopmentRegion string zh_CN" App/Info.plist 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :CFBundleDevelopmentRegion zh_CN" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations array" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleLocalizations:0 string zh-Hans" App/Info.plist 2>/dev/null || true

      - name: Build unsigned app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package IPA
        run: |
          cd ios/App
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -r ../Tacenda.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Tacenda-IPA
          path: ios/App/Tacenda.ipa
          retention-days: 90
